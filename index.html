<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d0e;
        --paper: #f3f0e8;
        --ink: #17191a;
        --muted: #a9b1b4;
        --cyan: #19bdd3;
        --yellow: #f5cd35;
        --pink: #d8489a;
        --gap: clamp(14px, 4vw, 28px);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        background: linear-gradient(145deg, #080909 0%, #111619 56%, #070808 100%);
        color: var(--paper);
        font-family: "Manrope", system-ui, sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, .018) 1px, transparent 1px);
        background-size: 36px 36px;
        -webkit-mask-image: linear-gradient(to bottom, #000, transparent 80%);
        mask-image: linear-gradient(to bottom, #000, transparent 80%);
      }

      img,
      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        -webkit-user-drag: none;
      }

      button {
        appearance: none;
        -webkit-appearance: none;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .page {
        position: relative;
        width: min(100dvw, 1680px);
        margin: 0 auto;
        overflow-x: hidden;
        padding: 14px 10px 44px;
      }

      .hello-mark {
        position: absolute;
        top: clamp(18px, 4vw, 34px);
        left: 50%;
        z-index: 8;
        width: min(42vw, 220px);
        height: auto;
        overflow: visible;
        pointer-events: none;
        transform: translateX(-50%) rotate(-2deg);
      }

      .hello-mark text {
        font-family: "Caveat", "Manrope", system-ui, sans-serif;
        font-size: 66px;
        fill: rgba(255, 255, 255, 0);
        stroke: #ffffff3d;
        stroke-width: 1.6px;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 560;
        stroke-dashoffset: 560;
        animation: hello-draw 3s .28s cubic-bezier(.7, 0, .2, 1) forwards, hello-fill .7s 1.9s ease forwards;
      }

      .hero {
        display: grid;
        min-height: 90svh;
        align-items: center;
        padding: 8px 0 82px;
      }

      .hero-stack {
        position: relative;
        display: grid;
        min-height: min(116vw, 660px);
        place-items: center;
        perspective: 1100px;
      }

      .hero-card {
        position: relative;
        z-index: 2;
        width: min(82vw, 420px);
        aspect-ratio: 4 / 5;
        overflow: hidden;
        border-radius: 28px;
        box-shadow: 0 32px 90px rgba(0, 0, 0, .44);
        transform: rotate(-3deg) translateZ(0);
        animation: float-main 8s ease-in-out infinite;
        touch-action: none;
                top: 8%;
      }

      .float-card,
      .chip {
        position: absolute;
        z-index: 4;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, .13);
        box-shadow: 0 24px 70px rgba(0, 0, 0, .36);
        touch-action: none;
      }

      .hero-stack .is-dragging {
        animation-play-state: paused;
        cursor: grabbing;
      }

      .float-card {
        width: min(44vw, 240px);
        aspect-ratio: 1;
        border-radius: 22px;
      }

      .float-card.one {
        top: 1%;
        right: 0;
        width: min(32vw, 170px);
        transform: rotate(9deg);
        animation: float-a 7s ease-in-out infinite;
      }

      .float-card.two {
        bottom: 2%;
        left: 0;
        width: min(38vw, 220px);
        aspect-ratio: 4 / 3;
        border-radius: 18px;
        transform: rotate(-10deg);
        animation: float-b 9s ease-in-out infinite;
      }

      .float-card.three {
        top: 4%;
        left: 2%;
        width: min(30vw, 150px);
        transform: rotate(353deg) !important;
        animation: float-c 7.5s ease-in-out infinite;
      }

      .chip {
        right: -2%;
        bottom: 6%;
        width: min(18vw, 96px);
        aspect-ratio: 1 / 1.28;
        border-radius: 16px;
        transform: rotate(7deg);
        animation: float-c 6.5s ease-in-out infinite;
      }

      .rail {
        display: grid;
        grid-auto-columns: 100%;
        grid-auto-flow: column;
        gap: 12px;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        padding: 4px 0 32px;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        cursor: grab;
        user-select: none;
      }

      .rail.is-dragging {
        cursor: grabbing;
        scroll-snap-type: none;
      }

      .rail::-webkit-scrollbar {
        display: none;
      }

      .rail-card {
        position: relative;
        aspect-ratio: 3 / 4;
        overflow: hidden;
        border-radius: 22px;
        background: rgba(255, 255, 255, .07);
        scroll-snap-align: start;
        transform: translateY(18px);
        opacity: 0;
        transition: opacity .7s ease, transform .7s cubic-bezier(.2, .8, .2, 1);
      }

      .rail-card:nth-child(even) {
        aspect-ratio: 4 / 5;
      }

      .gallery {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--gap);
            grid-auto-flow: row dense;
      }

      .work {
        position: relative;
        min-height: 250px;
        overflow: hidden;
        border-radius: var(--radius);
        background: rgba(255, 255, 255, .07);
        box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
        transform: translateY(30px) scale(.985);
        opacity: 0;
        transition:
          opacity .8s ease,
          transform .8s cubic-bezier(.2, .8, .2, 1),
          border-radius .35s ease;
        touch-action: pan-y;
      }

      .work:active,
      .rail-card:active {
        transform: scale(.975);
      }

      .work img,
      .rail-card img,
      .hero-card img,
      .float-card img,
      .chip img {
        transition: transform .75s cubic-bezier(.2, .8, .2, 1), filter .75s ease;
      }

      .work:hover img,
      .rail-card:hover img,
      .hero-card:hover img,
      .float-card:hover img,
      .chip:hover img {
        transform: scale(1.035);
      }

      .work.tall {
        aspect-ratio: 3 / 4.25;
      }

      .work.square {
        aspect-ratio: 1;
      }

      .work.wide {
        aspect-ratio: 16 / 10;
      }

      .work.poster {
        aspect-ratio: 4 / 5.7;
      }

      .work.video {
        aspect-ratio: 9 / 16;
      }

      .reveal.is-visible {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .work:nth-child(3n + 1).is-visible {
        transition-delay: .04s;
      }

      .work:nth-child(3n + 2).is-visible {
        transition-delay: .1s;
      }

      .work:nth-child(3n + 3).is-visible {
        transition-delay: .16s;
      }

      .cta {
        display: grid;
        gap: 12px;
        padding: clamp(32px, 8vw, 76px) 0 10px;
      }

      .cta-link {
        display: flex;
        min-height: 68px;
        align-items: center;
        justify-content: center;
        gap: 12px;
        border-radius: 8px;
        color: #fff;
        font-size: clamp(16px, 4vw, 26px);
        font-weight: 600;
        line-height: 1;
        text-decoration: none;
        transition: transform .35s cubic-bezier(.2, .8, .2, 1), border-color .35s ease, background .35s ease;
      }

      .cta-link:hover {
        transform: translateY(-3px);
      }

      .cta-link svg {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        transition: transform .38s cubic-bezier(.2, .8, .2, 1), opacity .24s ease;
      }

      .cta-link.primary:hover svg {
        animation: telegram-fly 1.05s cubic-bezier(.45, 0, .2, 1) infinite;
      }

      .cta-link.secondary:hover svg {
        animation: arrow-jump 1.05s cubic-bezier(.3, .8, .2, 1) infinite;
      }

      .cta-link.primary {
        background: #24a1de;
      }

      .cta-link.primary:hover {
        background: #35b7f2;
      }

      .cta-link.secondary {
        border: 1px solid rgba(255, 255, 255, .68);
        background: transparent;
      }

      .cta-link.secondary:hover {
        border-color: #fff;
        background: rgba(255, 255, 255, .06);
      }

      @keyframes telegram-fly {
        0% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
        54% { opacity: 0; transform: translate3d(12px, -12px, 0) scale(.58) rotate(8deg); }
        55% { opacity: 0; transform: translate3d(-10px, 10px, 0) scale(.58) rotate(8deg); }
        100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      }

      @keyframes arrow-jump {
        0% { opacity: 1; transform: translate3d(0, 0, 0); }
        42% { opacity: 0; transform: translate3d(10px, -10px, 0); }
        43% { opacity: 0; transform: translate3d(-8px, 8px, 0); }
        100% { opacity: 1; transform: translate3d(0, 0, 0); }
      }

      @keyframes hello-draw {
        to { stroke-dashoffset: 0; }
      }

      @keyframes hello-fill {
        to { fill: #ffffff5b; }
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(5, 6, 7, .9);
        backdrop-filter: blur(22px);
        opacity: 0;
        pointer-events: none;
        transition: opacity .24s ease;
      }

      .modal.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal img {
        width: auto;
        max-width: 100%;
        height: auto;
        max-height: 88svh;
        border-radius: 16px;
        object-fit: contain;
        box-shadow: 0 34px 120px rgba(0, 0, 0, .58);
        transform: scale(.96);
        transition: transform .24s ease;
        cursor: zoom-out;
        touch-action: auto;
      }

      .modal.is-open img {
        transform: scale(1);
      }

      .cursor-pill {
        --tilt-x: 0deg;
        --tilt-y: 0deg;
        --tilt-z: 0deg;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 90;
        display: flex;
        align-items: center;
        width: 210px;
        height: 40px;
        overflow: hidden;
        border-radius: 10px;
        background: #fff;
        color: #050505;
        box-shadow: 0 16px 42px rgba(0, 0, 0, .28);
        opacity: 0;
        pointer-events: none;
        transform: translate3d(-50%, -50%, 0) rotate(var(--tilt-z)) rotateX(var(--tilt-y)) rotateY(var(--tilt-x)) scale(.92);
        transition: opacity .18s ease, transform .24s cubic-bezier(.2, .8, .2, 1);
        transform-style: preserve-3d;
        perspective: 420px;
      }

      .cursor-pill.is-visible {
        opacity: 1;
        transform: translate3d(-50%, -50%, 0) rotate(var(--tilt-z)) rotateX(var(--tilt-y)) rotateY(var(--tilt-x)) scale(1);
      }

      .cursor-pill::before,
      .cursor-pill::after {
        position: absolute;
        top: 0;
        bottom: 0;
        z-index: 2;
        width: 46px;
        content: "";
        pointer-events: none;
      }

      .cursor-pill::before {
        left: 0;
        width: 64px;
        background: linear-gradient(90deg, #fff 0%, #fff 44%, rgba(255, 255, 255, 0) 100%);
      }

      .cursor-pill::after {
        right: 0;
        background: linear-gradient(270deg, #fff 0%, rgba(255, 255, 255, 0) 100%);
      }

      .cursor-track {
        display: inline-flex;
        width: max-content;
        padding-left: 48px;
        animation: cursor-marquee 9s linear infinite;
        white-space: nowrap;
      }

      .cursor-plus {
        position: absolute;
        left: 11px;
        top: 50%;
        z-index: 3;
        width: 14px;
        height: 14px;
        pointer-events: none;
        transform: translateY(-50%);
      }

      .cursor-plus::before,
      .cursor-plus::after {
        position: absolute;
        inset: 50% auto auto 0;
        width: 14px;
        height: 3px;
        border-radius: 99px;
        content: "";
        background: #050505;
        transform: translateY(-50%);
      }

      .cursor-plus::after {
        transform: translateY(-50%) rotate(90deg);
      }

      .cursor-track span {
        padding-right: 28px;
        font-size: 12px;
        font-weight: 750;
        letter-spacing: .045em;
        line-height: 1;
        text-transform: uppercase;
      }
      .close {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .1);
        backdrop-filter: blur(12px);
      }

      .close::before,
      .close::after {
        position: absolute;
        top: 21px;
        left: 12px;
        width: 20px;
        height: 2px;
        border-radius: 99px;
        content: "";
        background: var(--paper);
      }

      .close::before {
        transform: rotate(45deg);
      }

      .close::after {
        transform: rotate(-45deg);
      }

      @keyframes float-main {
        0%, 100% { transform: rotate(-3deg) translate3d(0, 0, 0); }
        50% { transform: rotate(-1deg) translate3d(0, -14px, 0); }
      }

      @keyframes float-a {
        0%, 100% { transform: rotate(9deg) translate3d(0, 0, 0); }
        50% { transform: rotate(13deg) translate3d(-8px, 12px, 0); }
      }

      @keyframes float-b {
        0%, 100% { transform: rotate(-10deg) translate3d(0, 0, 0); }
        50% { transform: rotate(-7deg) translate3d(10px, -10px, 0); }
      }

      @keyframes float-c {
        0%, 100% { transform: rotate(7deg) translate3d(0, 0, 0); }
        50% { transform: rotate(3deg) translate3d(0, 9px, 0); }
      }

      @keyframes cursor-marquee {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: .001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .001ms !important;
        }
      }

      @media (pointer: coarse) {
        .cursor-pill {
          display: none;
        }

        .hero-card {
          touch-action: auto;
        }
      }

      @media (min-width: 720px) {
        .page {
          padding: 18px 24px 42px;
        }

        .hero {
          min-height: 78svh;
        }

        .hero-stack {
          min-height: 720px;
        }

        .hero-card {
          width: min(43vw, 560px);
          aspect-ratio: 5 / 6;
          border-radius: 34px;
        }

        .float-card.one {
          right: 16%;
          width: min(24vw, 320px);
        }

        .float-card.two {
          left: 9%;
          width: min(30vw, 430px);
        }

        .float-card.three {
          left: 18%;
          width: min(16vw, 220px);
        }

        .chip {
          right: 24%;
          width: min(13vw, 170px);
        }

        .rail {
          display: none;
        }

        .gallery {
          grid-template-columns: repeat(6, 1fr);
          align-items: start;
        }

        .work {
          grid-column: span 3;
          border-radius: 22px;
        }

        .work.square {
          grid-column: span 2;
        }

        .work.wide {
          grid-column: span 4;
        }

        .work.tall,
        .work.video,
        .work.poster {
          grid-column: span 2;
        }

        .cta {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 16px;
        }

        .cta-link {
          min-height: 82px;
          border-radius: 14px;
        }
      }

      @media (min-width: 1180px) {
        .page {
          padding-inline: 42px;
        }

        .hero {
          min-height: 86svh;
        }

        .gallery {
          grid-template-columns: repeat(12, 1fr);
        }

        .work {
          grid-column: span 4;
        }

        .work.square {
          grid-column: span 3;
        }

        .work.wide {
          grid-column: span 6;
        }

        .work.tall,
        .work.video,
        .work.poster {
          grid-column: span 3;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <svg class="hello-mark" viewBox="0 0 260 96" aria-hidden="true">
        <text x="12" y="48">Привет</text>
      </svg>

      <section class="hero" aria-label="portfolio">
        <div class="hero-stack" data-tilt>
          <button class="hero-card" type="button" data-full="assets/works/08-menu.jpg" data-cursor-text="МЕНЮ / БАРНАЯ ПОЛИГРАФИЯ / МОКАП" aria-label="open">
            <img src="assets/works/08-menu.jpg" alt="" loading="eager">
          </button>
          <button class="float-card one" type="button" data-full="assets/works/01-cubes.jpg" data-cursor-text="ИВЕНТ-КУБЫ / БРЕНД-ОБЪЕКТЫ / CALLDAY" aria-label="open">
            <img src="assets/works/01-cubes.jpg" alt="" loading="eager">
          </button>
          <button class="float-card two" type="button" data-full="assets/works/03-notebook-wide.jpg" data-cursor-text="БЛОКНОТ / КРАФТ-ОБЛОЖКА / ОФИСНАЯ ПЕЧАТЬ" aria-label="open">
            <img src="assets/works/03-notebook-wide.jpg" alt="" loading="lazy">
          </button>
          <button class="float-card three" type="button" data-full="assets/works/SHUBER1.jpg" data-cursor-text="ШУБЕР / КВАДРАТНЫЙ МОКАП / ПОЛИГРАФИЯ" aria-label="open">
            <img src="assets/works/SHUBER1.jpg" alt="" loading="lazy">
          </button>
          <button class="chip" type="button" data-full="assets/works/02-tumbler.jpg" data-cursor-text="МЕРЧ / ТЕРМОСТАКАН / ТЁМНАЯ СЕРИЯ" aria-label="open">
            <img src="assets/works/02-tumbler.jpg" alt="" loading="lazy">
          </button>
        </div>
      </section>

      <section class="rail" aria-label="featured">
        <button class="rail-card reveal" type="button" data-full="assets/works/05-card-blue.jpg" data-cursor-text="ОТКРЫТКА / ГОЛУБАЯ СИСТЕМА / ПЕЧАТЬ" aria-label="open">
          <img src="assets/works/05-card-blue.jpg" alt="" loading="lazy">
        </button>
        <button class="rail-card reveal" type="button" data-full="assets/works/10-a4.jpg" data-cursor-text="ПОСТЕР A4 / ВЁРСТКА / ГОТОВО К ПЕЧАТИ" aria-label="open">
          <img src="assets/works/10-a4.jpg" alt="" loading="lazy">
        </button>
        <button class="rail-card reveal" type="button" data-full="assets/works/14-poster-person.jpg" data-cursor-text="ПЕРСОНАЛЬНЫЙ ПОСТЕР / РЕДАКТОРСКИЙ СТИЛЬ / ПЕЧАТЬ" aria-label="open">
          <img src="assets/works/14-poster-person.jpg" alt="" loading="lazy">
        </button>
        <button class="rail-card reveal" type="button" data-full="assets/works/04-notebook-silver.jpg" data-cursor-text="СЕРЕБРЯНЫЙ БЛОКНОТ / ОБЛОЖКА / МОКАП" aria-label="open">
          <img src="assets/works/04-notebook-silver.jpg" alt="" loading="lazy">
        </button>
      </section>

      <section class="gallery" aria-label="works">
        <div class="work video reveal" data-cursor-text="ВИЗИТКИ / АНИМАЦИЯ / ПЕЧАТНЫЙ НАБОР">
          <video src="assets/works/Vizitki-Anim2.mp4" autoplay muted loop playsinline preload="metadata"></video>
        </div>
        <button class="work square reveal" type="button" data-full="assets/works/12-stand.jpg" data-cursor-text="СТЕНД / ИВЕНТ-ПЕЧАТЬ / СЕРИЯ" aria-label="open">
          <img src="assets/works/12-stand.jpg" alt="" loading="lazy">
        </button>
        <button class="work tall reveal" type="button" data-full="assets/works/08-menu.jpg" data-cursor-text="МЕНЮ / БАРНАЯ ПОЛИГРАФИЯ / МОКАП" aria-label="open">
          <img src="assets/works/08-menu.jpg" alt="" loading="lazy">
        </button>
        <button class="work wide reveal" type="button" data-full="assets/works/06-calendar-open.jpg" data-cursor-text="КАЛЕНДАРЬ / ДВЕ СТОРОНЫ / НАСТОЛЬНАЯ ПЕЧАТЬ" aria-label="open">
          <img src="assets/works/06-calendar-open.jpg" alt="" loading="lazy">
        </button>
        <button class="work poster reveal" type="button" data-full="assets/works/10-a4.jpg" data-cursor-text="ПОСТЕР A4 / ВЁРСТКА / ГОТОВО К ПЕЧАТИ" aria-label="open">
          <img src="assets/works/10-a4.jpg" alt="" loading="lazy">
        </button>
        <button class="work wide reveal" type="button" data-full="assets/works/07-certificate.jpg" data-cursor-text="СЕРТИФИКАТ / МОКАП В РУКЕ / БРЕНД-ПЕЧАТЬ" aria-label="open">
          <img src="assets/works/07-certificate.jpg" alt="" loading="lazy">
        </button>
        <button class="work tall reveal" type="button" data-full="assets/works/04-notebook-silver.jpg" data-cursor-text="СЕРЕБРЯНЫЙ БЛОКНОТ / ОБЛОЖКА / МОКАП" aria-label="open">

    <div class="cursor-pill" aria-hidden="true">
      <span class="cursor-plus"></span>
      <div class="cursor-track"></div>
    </div>

    <div class="modal" id="modal" aria-hidden="true">
      <button class="close" type="button" aria-label="close"></button>
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
    </div>

    <script>
      const modal = document.querySelector('#modal');
      const modalImage = modal.querySelector('img');
      const close = modal.querySelector('.close');
      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const cursorPill = document.querySelector('.cursor-pill');
      const cursorTrack = cursorPill.querySelector('.cursor-track');
      let suppressOpen = false;
      let cursorX = window.innerWidth / 2;
      let cursorY = window.innerHeight / 2;
      let targetX = cursorX;
      let targetY = cursorY;
      let previousTargetX = targetX;
      let previousTargetY = targetY;
      let tiltX = 0;
      let tiltY = 0;
      let tiltZ = 0;
      let cursorActive = false;

      document.querySelectorAll('[data-full]').forEach((item) => {
        item.addEventListener('click', () => {
          if (suppressOpen) return;
          modalImage.src = item.dataset.full;
          modalImage.style.transform = '';
          modal.classList.add('is-open');
          modal.setAttribute('aria-hidden', 'false');
        });
      });

      const closeModal = () => {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        modalImage.style.transform = '';
        setTimeout(() => {
          if (!modal.classList.contains('is-open')) {
            modalImage.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';
          }
        }, 260);
      };

      close.addEventListener('click', closeModal);
      modalImage.addEventListener('click', closeModal);
      modal.addEventListener('click', (event) => {
        if (event.target === modal) closeModal();
      });
      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeModal();
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: .18 });

      document.querySelectorAll('.reveal').forEach((item) => observer.observe(item));

      const setCursorText = (text) => {
        cursorTrack.replaceChildren();
        for (let i = 0; i < 6; i += 1) {
          const item = document.createElement('span');
          item.textContent = text;
          cursorTrack.append(item);
        }
      };

      const showCursorPill = (event, text) => {
        if (!matchMedia('(pointer: fine)').matches) return;
        cursorActive = true;
        targetX = event.clientX + 96;
        targetY = event.clientY + 42;
        setCursorText(text);
        cursorPill.classList.add('is-visible');
      };

      const moveCursorPill = (event) => {
        if (!cursorActive) return;
        previousTargetX = targetX;
        previousTargetY = targetY;
        targetX = event.clientX + 96;
        targetY = event.clientY + 42;
        tiltX = clamp((targetX - previousTargetX) * .34, -13, 13);
        tiltY = clamp((previousTargetY - targetY) * .28, -10, 10);
        tiltZ = clamp((targetX - previousTargetX) * .22 + (targetY - previousTargetY) * .08, -15, 15);
      };

      const hideCursorPill = () => {
        cursorActive = false;
        cursorPill.classList.remove('is-visible');
      };

      document.querySelectorAll('[data-cursor-text]').forEach((item) => {
        item.addEventListener('pointerenter', (event) => {
          showCursorPill(event, item.dataset.cursorText);
        });
        item.addEventListener('pointermove', moveCursorPill);
        item.addEventListener('pointerleave', hideCursorPill);
      });

      const renderCursorPill = () => {
        cursorX += (targetX - cursorX) * .16;
        cursorY += (targetY - cursorY) * .16;
        tiltX += (0 - tiltX) * .045;
        tiltY += (0 - tiltY) * .045;
        tiltZ += (0 - tiltZ) * .045;
        cursorPill.style.left = `${cursorX}px`;
        cursorPill.style.top = `${cursorY}px`;
        cursorPill.style.setProperty('--tilt-x', `${tiltX}deg`);
        cursorPill.style.setProperty('--tilt-y', `${tiltY}deg`);
        cursorPill.style.setProperty('--tilt-z', `${tiltZ}deg`);
        requestAnimationFrame(renderCursorPill);
      };

      renderCursorPill();

      document.querySelectorAll('.rail').forEach((rail) => {
        let isDown = false;
        let didDrag = false;
        let startX = 0;
        let scrollLeft = 0;

        rail.addEventListener('pointerdown', (event) => {
          isDown = true;
          didDrag = false;
          startX = event.clientX;
          scrollLeft = rail.scrollLeft;
          rail.classList.add('is-dragging');
          rail.setPointerCapture(event.pointerId);
        });

        rail.addEventListener('pointermove', (event) => {
          if (!isDown) return;
          if (Math.abs(event.clientX - startX) > 5) didDrag = true;
          rail.scrollLeft = scrollLeft - (event.clientX - startX);
        });

        const stopDrag = () => {
          if (didDrag) {
            suppressOpen = true;
            setTimeout(() => {
              suppressOpen = false;
            }, 140);
          }
          isDown = false;
          rail.classList.remove('is-dragging');
        };

        rail.addEventListener('pointerup', stopDrag);
        rail.addEventListener('pointercancel', stopDrag);
        rail.addEventListener('pointerleave', stopDrag);
      });

      document.querySelectorAll('.hero-stack [data-full]').forEach((item) => {
        let isDown = false;
        let didDrag = false;
        let startX = 0;
        let startY = 0;
        let baseX = 0;
        let baseY = 0;
        let moveX = 0;
        let moveY = 0;

        item.addEventListener('pointerdown', (event) => {
          if (item.classList.contains('hero-card') && matchMedia('(pointer: coarse)').matches) return;
          isDown = true;
          didDrag = false;
          startX = event.clientX;
          startY = event.clientY;
          baseX = moveX;
          baseY = moveY;
          item.classList.add('is-dragging');
          item.setPointerCapture(event.pointerId);
        });

        item.addEventListener('pointermove', (event) => {
          if (!isDown) return;
          const dx = event.clientX - startX;
          const dy = event.clientY - startY;
          if (Math.hypot(dx, dy) > 5) didDrag = true;
          if (matchMedia('(pointer: fine)').matches) {
            moveX = baseX + dx;
            moveY = baseY + dy;
          } else {
            moveX = clamp(baseX + dx, -42, 42);
            moveY = clamp(baseY + dy, -54, 54);
          }
          item.style.translate = `${moveX}px ${moveY}px`;
        });

        const stopHeroDrag = () => {
          if (didDrag) {
            suppressOpen = true;
            setTimeout(() => {
              suppressOpen = false;
            }, 140);
          }
          isDown = false;
          item.classList.remove('is-dragging');
        };

        item.addEventListener('pointerup', stopHeroDrag);
        item.addEventListener('pointercancel', stopHeroDrag);
      });

      const stack = document.querySelector('[data-tilt]');
      stack.addEventListener('pointermove', (event) => {
        if (matchMedia('(pointer: coarse)').matches) return;
        const rect = stack.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - .5;
        const y = (event.clientY - rect.top) / rect.height - .5;
        stack.style.transform = `rotateX(${y * -5}deg) rotateY(${x * 7}deg)`;
      });
      stack.addEventListener('pointerleave', () => {
        stack.style.transform = '';
      });
    </script>
  </body>
